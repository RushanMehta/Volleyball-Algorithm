    <script type="py">
import json

# Your exact algorithm code
class VolleyballMatchSimulator:
    def __init__(self, level, gender):
        self.level = level
        self.gender = gender
        self.base_rates = self._get_baseline_rates()

    def _get_baseline_rates(self):
        transitions = {
            ('High School', 'Girls'): {'in_system': 0.38, 'out_system': 0.16}
        }
        return transitions.get((self.level, self.gender), {'in_system': 0.45, 'out_system': 0.25})

    def calculate_point_win_probability(self, serve_stats):
        p_ace = serve_stats['ace_rate']
        p_error = serve_stats['error_rate']
        p_in = 1.0 - (p_ace + p_error)
        
        if p_in <= 0: return p_ace

        p_perfect_pass = serve_stats['opp_perfect_pass_rate']
        opp_kill_in_sys = self.base_rates['in_system']
        opp_kill_out_sys = self.base_rates['out_system']

        opp_efficiency_weighted = (p_perfect_pass * opp_kill_in_sys) + ((1 - p_perfect_pass) * opp_kill_out_sys)
        return p_ace + (p_in * (1.0 - opp_efficiency_weighted))

    def compute_set_win_expectancy(self, score_us, score_them, p_win_point, memo=None):
        if memo is None: memo = {}
        state = (score_us, score_them)
        if state in memo: return memo[state]

        if score_us >= 25 and (score_us - score_them) >= 2: return 1.0
        if score_them >= 25 and (score_them - score_us) >= 2: return 0.0
        if score_us > 30 or score_them > 30:
            return 0.5 if score_us == score_them else (1.0 if score_us > score_them else 0.0)

        prob_if_we_win_point = self.compute_set_win_expectancy(score_us + 1, score_them, p_win_point, memo)
        prob_if_we_lose_point = self.compute_set_win_expectancy(score_us, score_them + 1, p_win_point, memo)
        
        win_expectancy = (p_win_point * prob_if_we_win_point) + ((1 - p_win_point) * prob_if_we_lose_point)
        memo[state] = win_expectancy
        return win_expectancy

# Run the simulation right now for the website display
coach_simulator = VolleyballMatchSimulator(level="High School", gender="Girls")
player_serve_matrix = {
    "Aggressive Jump Float (Zone 1)": {"ace_rate": 0.12, "error_rate": 0.06, "opp_perfect_pass_rate": 0.25},
    "High-Risk Jump Spin (Zone 6)": {"ace_rate": 0.22, "error_rate": 0.26, "opp_perfect_pass_rate": 0.15},
    "Safe Standing Float (Target Weak Passer)": {"ace_rate": 0.04, "error_rate": 0.02, "opp_perfect_pass_rate": 0.45}
}

# Evaluate at score 22-23
best_strategy = None
max_set_win_prob = -1.0

for strategy_name, stats in player_serve_matrix.items():
    p_point = coach_simulator.calculate_point_win_probability(stats)
    p_set = coach_simulator.compute_set_win_expectancy(22, 23, p_point)
    if p_set > max_set_win_prob:
        max_set_win_prob = p_set
        best_strategy = strategy_name

# Target the HTML element on the page and change its text using Python!
from pyscript import display
output_text = f"At Score 22-23, the mathematical model recommends: <br><br><span class='strategy'>{best_strategy}</span><br><br>This gives your team a {round(max_set_win_prob * 100, 1)}% chance of winning the set."
display(output_text, target="output", append=False)
    </script>
